<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Clinique Angus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0d1f2d 0%, #152c3a 50%, #1b3848 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(163,116,91,0.2);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .login-logo img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }
    .login-logo-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      line-height: 1.3;
    }
    .login-logo-text span {
      display: block;
      font-size: 0.72rem;
      color: #a3745b;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.8rem;
      font-weight: 500;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      margin-bottom: 1.2rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #a3745b;
      background: rgba(255,255,255,0.1);
    }
    input::placeholder { color: rgba(255,255,255,0.3); }
    .login-btn {
      width: 100%;
      background: #a3745b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .login-btn:hover { background: #8b5e44; }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #a3745b; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="/logo.png" alt="Logo" />
      <div class="login-logo-text">
        Clinique Dentaire Admin
        <span>Angus-Maisonneuve</span>
      </div>
    </div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to manage your website content.</p>

    <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>

    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />

      <button class="login-btn" type="submit" id="loginBtn">Sign In →</button>
    </form>

    <a href="/" class="back-link">← Back to website</a>
  </div>

  <script>
    // If already logged in, redirect to admin
    if (localStorage.getItem('adminToken')) {
      try {
        const payload = JSON.parse(atob(localStorage.getItem('adminToken').split('.')[1]));
        if (payload.exp * 1000 > Date.now()) {
          window.location.replace('/admin');
        } else {
          localStorage.removeItem('adminToken');
        }
      } catch {
        localStorage.removeItem('adminToken');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('adminToken', data.token);
          window.location.replace('/admin');
        } else {
          errorMsg.style.display = 'block';
          errorMsg.textContent = data.error || 'Invalid credentials.';
          btn.disabled = false;
          btn.textContent = 'Sign In →';
        }
      } catch {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    });
  </script>
</body>
</html>
