<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Clinique Dentaire Angus</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #152c3a;
      --navy-mid: #1b3848;
      --teal: #8b5e44;
      --teal-light: #a3745b;
      --gold: #a3745b;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(163,116,91,0.15) 0%, transparent 70%);
    }
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(163,116,91,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(163,116,91,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .card {
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .logo svg { width: 38px; height: 38px; }
    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: white;
      line-height: 1.2;
    }
    .logo-text span {
      display: block;
      font-size: 0.68rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: white;
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 0.7rem 1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: white;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }
    input:focus {
      border-color: var(--teal-light);
      background: rgba(255,255,255,0.07);
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    button {
      width: 100%;
      background: linear-gradient(135deg, var(--teal), var(--teal-light));
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(163,116,91,0.3);
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(163,116,91,0.45);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--teal-light); }
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; margin: 1rem; border-radius: 12px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo.png" alt="Logo" style="width:40px;height:40px;object-fit:contain;" />
      <div class="logo-text">
        Clinique Dentaire Angus
        <span>Admin Portal</span>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage appointments</p>

    <div id="errorMsg" class="error-msg" style="display:none;">
      Invalid username or password
    </div>

    <form method="POST" action="/admin/login" id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="admin" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit">Sign In →</button>
    </form>

    <a href="/" class="back-link">← Back to website</a>
  </div>

  <script>
    // Show error if redirected with ?error=1
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('errorMsg').style.display = 'block';
    }
  </script>
</body>
</html>
